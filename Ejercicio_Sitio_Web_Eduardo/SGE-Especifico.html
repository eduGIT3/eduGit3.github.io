<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./CSS/cssEspecifico.css">
    <title>Dolibarr</title>
</head>
<body>

    <header><img src="./IMG/dolibar.png" alt="Dolibarr">Dolibarr</header>
    
    <aside>
        <div>
            <button id="boton" onclick="menu()"><img src="./IMG/menu.png" alt="menu"></button> 
            <ul class="boton" id="lista">
                <li><a href="./index.html">Página de inicio</a></li>
                <li><a href="./generalSGE.html">Que es SGE</a></li>
                <li><a href="#pie">Creditos</a></li>
            </ul>
        </div>
    </aside>

    <main>
        <section>
            <h4>Aquí voy a documentar la instalación de Dolibarr, un SGE ligero y de código abierto para PYMEs</h4>
        </section>

        <section>
            <figure> 
                <img src="./IMG/cap1.png" alt="cap1">
                <figcaption>
                    <strong>Paso 1:</strong> Para comenzar, debemos descargar el instalador 'DoliWamp' desde el sitio oficial. Este paquete 'todo en uno' nos facilitará muchísimo la tarea al instalar Apache, MariaDB y Dolibarr de una sola vez.
                </figcaption>
            </figure>
            
            <figure> 
                <img src="./IMG/cap2.png" alt="cap2">
                <figcaption>
                    <strong>Paso 2:</strong> Una vez descargado, ejecutamos el archivo .exe. Nos aparece la ventana de bienvenida del asistente de instalación. Este proceso es sencillo, casi todo 'Siguiente, Siguiente'.
                </figcaption>
            </figure>
            
            <figure> 
                <img src="./IMG/cap3.png" alt="cap3">
                <figcaption>
                    <strong>Paso 3:</strong> Aquí seleccionamos la carpeta donde queremos que se instale Dolibarr
                </figcaption>
            </figure>
            
            <figure> 
                <img src="./IMG/cap4.png" alt="cap4">
                <figcaption>
                    <strong>Paso 4:</strong> El asistente comienza a copiar todos los archivos del sistema a nuestro disco duro y a configurar los servicios necesarios. Esta fase puede tardar unos minutos.
                </figcaption>
            </figure>
            
            <figure> 
                <img src="./IMG/cap5.png" alt="cap5">
                <figcaption>
                    <strong>Paso 5:</strong> La instalación básica de DoliWamp ha finalizado con éxito. Al pulsar Finalizar, el instalador abrirá automáticamente nuestro navegador web predeterminado para comenzar la configuración inicial del SGE.
                </figcaption>
            </figure>

            <figure> 
                <img src="./IMG/cap6.png" alt="cap6">
                <figcaption>
                    <strong>Paso 6:</strong> Dolibarr se está ejecutando en nuestro propio ordenador a través del navegador. Ahora estamos en la página web de bienvenida, listos para introducir los datos de usuario que previamente habremos completado.
                </figcaption>
            </figure>
        </section>

        <section>
            <h2>Configuración, seguridad e informes Dolibarr</h2>
            <video src="./VID/20 (1).mp4" controls></video>
        </section>
    </main>

    <footer id="pie">
        <p>Esta página ha sido creada por Eduardo Calvo 1ºDAM</p>
    </footer>
    
    <script>
        function menu(){
            let lista = document.getElementById('lista');
            lista.classList.toggle('boton');
        }

        window.addEventListener('click', function(evento) {
            let lista = document.getElementById('lista');
            let boton = document.getElementById('boton');
            
            if (!lista.classList.contains('boton') && evento.target !== boton && !boton.contains(evento.target)) {
                lista.classList.add('boton'); 
            }
        });
    </script>
</body>
</html>
